version: '3.8'

services:
  backend:
    build: ./back
    container_name: sdvx-backend
    restart: always
    ports:
      - "8000:8000"

  frontend:
    build: ./front
    container_name: sdvx-frontend
    restart: always
    ports:
      - "80:8501"
    depends_on:
      - backend